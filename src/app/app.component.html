<main>
  <header class="app-header">
  </header>
  <router-outlet></router-outlet>
</main>

<iframe
  #musicFrame
  class="background-music"
  [src]="backgroundMusicUrl"
  allow="autoplay"
  frameborder="0">
</iframe>

<button
  class="music-toggle"
  (click)="toggleMusic()">
  <i class="material-icons">{{ musicMuted ? 'volume_off' : 'volume_up' }}</i>
</button>
